<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NaiwaProxy · Main UI Preview</title>
  <style>
    :root {
      --bg: #0b1020;
      --side: #080d18;
      --panel: #111827;
      --panel2: #1a2336;
      --panel3: #0f172a;
      --line: #243047;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #facc15;
      --accent-soft: rgba(250, 204, 21, .12);
      --accent-text: #fde68a;
      --blue: #38bdf8;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --shadow: 0 18px 40px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
    }
    button, input, select { font: inherit; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-columns: 272px 1fr;
      min-width: 1240px;
      min-height: 760px;
    }
    .side {
      background: linear-gradient(180deg, #0a0f1a 0%, var(--side) 100%);
      border-right: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      overflow: hidden;
      flex: none;
      box-shadow: 0 8px 20px rgba(245, 158, 11, .22);
      background: #fff;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand h1 { margin: 0; font-size: 17px; font-weight: 700; }
    .brand p { margin: 4px 0 0; font-size: 11px; color: var(--muted); }
    .nav-search {
      margin: 14px 14px 8px;
      position: relative;
    }
    .nav-search input {
      width: 100%;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--text);
      padding: 0 12px 0 34px;
      outline: none;
    }
    .nav-search span {
      position: absolute;
      left: 11px;
      top: 9px;
      color: var(--muted);
      font-size: 13px;
    }
    .nav {
      flex: 1;
      overflow: auto;
      padding: 4px 10px 12px;
    }
    .root, .group-title, .child {
      width: 100%;
      border: 0;
      text-align: left;
      cursor: pointer;
      background: transparent;
    }
    .root, .group-title {
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      color: #cbd5e1;
      margin: 2px 0;
    }
    .root.active, .child.active {
      background: var(--accent-soft);
      color: var(--accent-text);
      font-weight: 700;
    }
    .group-title {
      font-size: 13px;
      font-weight: 600;
      justify-content: space-between;
      color: #cbd5e1;
      letter-spacing: .01em;
    }
    .group-title.expanded {
      color: var(--accent-text);
      background: rgba(255,255,255,.03);
    }
    .group-title .chevron {
      color: var(--muted);
      font-size: 11px;
      transition: transform .18s ease;
    }
    .group-title.expanded .chevron { transform: rotate(180deg); color: var(--accent-text); }
    .group-title .left { display: flex; gap: 8px; align-items: center; }
    .group-title:hover, .root:hover, .child:hover { background: rgba(255,255,255,.04); }
    .children.closed { display: none; }
    .child {
      height: 32px;
      margin: 1px 0 1px 12px;
      padding: 0 14px;
      border-radius: 9px;
      color: #94a3b8;
      font-size: 12px;
    }
    .side-status {
      margin: 0 12px 14px;
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--green);
      margin-right: 8px;
      box-shadow: 0 0 0 4px rgba(74, 222, 128, .12);
    }
    .main {
      display: grid;
      grid-template-rows: 72px 1fr;
      min-width: 0;
    }
    .top {
      border-bottom: 1px solid #1e293b;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(8, 13, 24, .72);
      backdrop-filter: blur(10px);
    }
    .top h2 { margin: 0; font-size: 22px; font-weight: 700; }
    .top p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
    .tools { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .top-proxy-toggle {
      min-width: 132px;
      height: 38px;
      margin: 0;
    }
    .pill, .badge {
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .pill.ok { background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.25); color: #bbf7d0; }
    .pill.warn { background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.25); color: #fde68a; }
    .badge { background: #172033; border-color: var(--line); color: #cbd5e1; }
    .select, .button {
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: #e2e8f0;
      padding: 0 14px;
      cursor: pointer;
    }
    .button.primary {
      background: linear-gradient(135deg, #facc15, #f59e0b);
      border-color: #fbbf24;
      color: #111827;
      font-weight: 700;
    }
    .button.ghost { background: transparent; }
    .button.danger { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.35); color: #fecaca; }
    .button:hover { filter: brightness(1.06); }
    .content {
      padding: 22px 24px 28px;
      overflow: auto;
    }
    .grid2 { display: grid; grid-template-columns: 1.05fr .95fr; gap: 16px; margin-bottom: 16px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
    .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .card.compact { padding: 14px 16px; }
    .section-title { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 4px; }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.65; }
    .hero {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 18px;
      align-items: stretch;
    }
    .title-large { font-size: 28px; font-weight: 800; margin: 8px 0 6px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }
    .stat-box {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .stat-box b { display: block; font-size: 20px; margin-bottom: 4px; }
    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .actions.single { grid-template-columns: 1fr; align-content: center; }
    .kpis .small, .small {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }
    .small b { display: block; font-size: 24px; margin-top: 6px; }
    .list { display: grid; gap: 8px; margin-top: 14px; }
    .item {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 11px 12px;
      font-size: 13px;
      color: #cbd5e1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .item .left { display: flex; gap: 10px; align-items: center; min-width: 0; }
    .item .left:before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 99px;
      background: var(--accent);
      flex: none;
    }
    .item .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: #cbd5e1;
      background: #0f172a;
    }
    .tag.green { color: #86efac; border-color: rgba(34,197,94,.3); background: rgba(34,197,94,.08); }
    .tag.yellow { color: #fde68a; border-color: rgba(251,191,36,.3); background: rgba(251,191,36,.08); }
    .tag.red { color: #fca5a5; border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }
    .table-wrap { overflow: auto; margin-top: 14px; border: 1px solid var(--line); border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.04); }
    th { color: #94a3b8; font-weight: 600; background: #0f172a; position: sticky; top: 0; }
    tr:hover td { background: rgba(255,255,255,.02); }
    tr.active td { background: var(--accent-soft); }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
      align-items: center;
    }
    .toolbar input, .toolbar select {
      height: 34px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--text);
      padding: 0 10px;
      min-width: 140px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 120px 1fr 120px 1fr;
      gap: 12px 14px;
      margin-top: 14px;
      align-items: center;
    }
    .form-grid label { color: #94a3b8; font-size: 12px; }
    .form-grid input, .form-grid select, .form-grid textarea {
      height: 34px;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--text);
      padding: 0 10px;
      width: 100%;
    }
    .form-grid textarea { min-height: 88px; padding: 10px; resize: vertical; }
    .form-grid .span2 { grid-column: span 3; }
    .form-grid .span4 { grid-column: 1 / -1; }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: 13px;
    }
    .toggle-row:last-child { border-bottom: 0; }
    .switch {
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: #334155;
      position: relative;
    }
    .switch.on { background: #ca8a04; }
    .switch:after {
      content: "";
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: white;
    }
    .switch.on:after { left: 21px; }
    .log-panel {
      margin-top: 14px;
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #cbd5e1;
      min-height: 220px;
      max-height: 320px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .health-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .health {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--panel2);
      border: 1px solid var(--line);
      font-size: 12px;
    }
    .progress {
      height: 8px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }
    .progress > i {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #facc15, #f59e0b);
      border-radius: 999px;
    }
    .empty-note {
      border: 1px dashed #334155;
      border-radius: 12px;
      padding: 16px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.7;
      margin-top: 14px;
    }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 120px;
      margin-top: 16px;
    }
    .chart-bars i {
      flex: 1;
      display: block;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(180deg, rgba(250,204,21,.85), rgba(245,158,11,.35));
      min-height: 18px;
    }
    .dash-controls {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .dash-controls.embedded {
      margin: 16px 0 0;
      padding: 16px 0 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .control-row + .control-row {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .control-field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: var(--panel2);
      font-size: 13px;
      color: #e2e8f0;
    }
    .control-field label {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .control-field select {
      height: 32px;
      border: 0;
      background: transparent;
      color: #f8fafc;
      outline: none;
      min-width: 168px;
      cursor: pointer;
    }
    .control-field.grow { flex: 1; min-width: 220px; }
    .ctx-menu {
      position: fixed;
      z-index: 1000;
      min-width: 196px;
      padding: 6px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #111827;
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
    }
    .ctx-menu.hidden { display: none; }
    .ctx-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: #e2e8f0;
      text-align: left;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .ctx-item:hover { background: rgba(255,255,255,.06); }
    .ctx-item.danger { color: #fca5a5; }
    .ctx-item.disabled { color: var(--muted); cursor: default; }
    .ctx-item.disabled:hover { background: transparent; }
    .ctx-sep { height: 1px; margin: 4px 8px; background: var(--line); }
    .ctx-hint {
      padding: 6px 12px 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(2,6,23,.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal.hidden { display: none; }
    .modal-panel {
      width: min(920px, 96vw);
      max-height: 88vh;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }
    .modal-head h3 { margin: 0; font-size: 16px; }
    .modal-close {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(255,255,255,.06); color: #fff; }
    .modal-body { padding: 16px 18px 18px; }
    .modal-body .card { box-shadow: none; margin: 0; }
    .node-table-area tbody tr { cursor: context-menu; }
    .control-field.system-proxy {
      min-width: 220px;
      padding-right: 8px;
    }
    .control-field.system-proxy select {
      min-width: 188px;
      flex: 1;
    }
    .control-field.proxy-switch {
      min-width: 132px;
      border-color: rgba(250, 204, 21, .28);
      background: rgba(250, 204, 21, .08);
    }
    .control-field.proxy-switch .state {
      font-size: 12px;
      color: #86efac;
      font-weight: 600;
    }
    .control-field.proxy-switch.off {
      border-color: var(--line);
      background: var(--panel2);
    }
    .control-field.proxy-switch.off .state { color: var(--muted); font-weight: 500; }
    .control-field[data-switch] { cursor: pointer; user-select: none; }
    .control-field[data-switch] select { cursor: default; }
    .control-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .latency-banner {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      flex: 1;
      min-width: 280px;
      font-size: 13px;
    }
    .latency-banner .node-id {
      color: #fde68a;
      font-weight: 600;
    }
    .latency-banner .latency-val {
      color: #86efac;
      font-weight: 700;
    }
    .latency-banner .latency-val.warn { color: #fde68a; }
    .latency-banner .latency-val.bad { color: #fca5a5; }
    .node-picker {
      min-width: 180px;
      height: 38px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: #f8fafc;
      padding: 0 12px;
    }
    .node-status-bar {
      margin-bottom: 14px;
    }
    @media (max-width: 1400px) {
      .grid4 { grid-template-columns: repeat(2, 1fr); }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <div class="logo"><img src="assets/app-icon.png" alt="NaiwaProxy" /></div>
        <div>
          <h1>NaiwaProxy</h1>
          <p>Windows · Xray Client</p>
        </div>
      </div>
      <div class="nav-search">
        <span>⌕</span>
        <input id="navFilter" placeholder="搜索菜单…" />
      </div>
      <div class="nav" id="nav"></div>
      <div class="side-status">
        <div style="font-size:13px;font-weight:700"><span class="dot"></span>运行中 · 系统代理已开启</div>
        <div class="muted" style="margin-top:8px">节点：香港 01 · VMess</div>
        <div class="muted">HTTP 127.0.0.1:10809 · SOCKS 10808</div>
        <div class="muted">Core PID 14328 · 已运行 2h 18m</div>
      </div>
    </aside>
    <main class="main">
      <header class="top">
        <div>
          <h2 id="title">节点管理</h2>
        </div>
        <div class="tools" id="topTools">
          <div class="badge" id="topTraffic">↓ 18.4 MB/s · ↑ 820 KB/s</div>
          <div class="top-proxy-toggle control-field proxy-switch" data-switch>
            <label>启用代理</label>
            <div class="switch on"></div>
            <span class="state">运行中</span>
          </div>
        </div>
      </header>
      <section class="content" id="content"></section>
    </main>
  </div>
  <div id="ctxMenu" class="ctx-menu hidden"></div>
  <div id="modal" class="modal hidden">
    <div class="modal-panel">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" id="modalClose" type="button">×</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>
<script>
const navGroups = [
  { icon: "◎", title: "节点管理", items: [["node-list", "节点管理"]], root: true },
  { icon: "⇅", title: "订阅管理", items: [
    ["sub-list","订阅列表"],["sub-update","订阅更新"],["sub-parse","订阅解析"],["sub-policy","订阅策略"]
  ]},
  { icon: "◌", title: "代理模式", items: [
    ["proxy-system","系统代理"],["proxy-tun","TUN 模式"],["proxy-pac","PAC 模式"],["proxy-port","代理端口"]
  ]},
  { icon: "⌁", title: "路由规则", items: [
    ["rule-mode","规则模式"],["rule-list","规则列表"],["rule-action","规则操作"],["rule-set","规则集"]
  ]},
  { icon: "▦", title: "分组与策略", items: [
    ["group-node","节点分组"],["group-policy","策略组"],["group-auto","自动切换"]
  ]},
  { icon: "◈", title: "Core 管理", items: [
    ["core-type","Core 类型"],["core-file","Core 文件"],["core-run","Core 运行"],["core-config","配置生成"]
  ]},
  { icon: "≡", title: "日志与诊断", items: [
    ["log-run","运行日志"],["log-viewer","日志查看器"],["diagnosis","诊断工具"]
  ]},
  { icon: "DNS", title: "DNS 设置", items: [

let current = "node-list";
const expandedGroups = new Set();

function isRootPage(key) {
  return navGroups.some(g => g.root && g.items.some(([k]) => k === key));
}

function el(tag, cls = "", text = "") {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

function findGroupByPageKey(key) {
  if (isRootPage(key)) return null;
  return navGroups.find(g => !g.root && g.items.some(([k]) => k === key)) || null;
}

function buildNav(filter = "") {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  const q = filter.trim().toLowerCase();
  navGroups.forEach(g => {
    const visibleItems = g.items.filter(([_, title]) => !q || title.toLowerCase().includes(q) || g.title.toLowerCase().includes(q));
    if (!g.root && visibleItems.length === 0) return;
    if (g.root) {
      const key = g.items[0][0];
      const b = el("button", "root" + (current === key ? " active" : ""), g.icon + "　" + g.title);
      b.dataset.key = key;
      b.onclick = () => show(key);
      nav.appendChild(b);
      return;
    }
    const isExpanded = q ? true : expandedGroups.has(g.title);
    const head = el("button", "group-title" + (isExpanded ? " expanded" : ""));
    head.innerHTML = `<span class="left"><span>${g.icon}</span><span>${g.title}</span></span><span class="chevron">⌄</span>`;
    nav.appendChild(head);
    const children = el("div", "children" + (isExpanded ? "" : " closed"));
    nav.appendChild(children);
    head.onclick = () => {
      if (expandedGroups.has(g.title)) expandedGroups.delete(g.title);
      else expandedGroups.add(g.title);
      buildNav(document.getElementById("navFilter").value);
    };
    visibleItems.forEach(([key, title]) => {
      const c = el("button", "child" + (current === key ? " active" : ""), title);
      c.dataset.key = key;
      c.onclick = () => show(key);
      children.appendChild(c);
    });
  });
}

function card(title, body) {
  const head = title ? `<div class="section-title">${title}</div>` : "";
  return `<div class="card">${head}${body}</div>`;
}
function actions(items, primaryFirst = true) {
  return `<div class="actions">${items.map((x, i) => `<button class="button ${primaryFirst && i === 0 ? "primary" : ""}">${x}</button>`).join("")}</div>`;
}
function toggles(items) {
  return `<div class="list">${items.map(([label, on]) => `
    <div class="toggle-row"><span>${label}</span><div class="switch ${on ? "on" : ""}"></div></div>`).join("")}</div>`;
}
function table(headers, rows, activeIndex = 0) {
  return `<div class="table-wrap"><table><thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>
    ${rows.map((r, i) => `<tr class="${i === activeIndex ? "active" : ""}">${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}
  </tbody></table></div>`;
}

const ctxMenuEl = document.getElementById("ctxMenu");
const modalEl = document.getElementById("modal");
const modalTitleEl = document.getElementById("modalTitle");
const modalBodyEl = document.getElementById("modalBody");
let ctxTargetRow = null;

const ctxMenus = {
  node: [
    { label: "设为活动节点" },
    { label: "编辑节点", page: "node-edit" },
    { sep: true },
    { label: "复制分享链接" },
    { label: "生成二维码" },
    { sep: true },
    { label: "TCP 测速" },
    { label: "Real 测速" },
    { sep: true },
    { label: "删除节点", danger: true }
  ],
  list: [
    { label: "新建节点", page: "node-edit" },
    { label: "导入节点…", page: "node-import" },
    { label: "导出节点…", page: "node-export" },
    { sep: true },
    { label: "全部 TCP 测速", page: "node-speed" },
    { label: "全部 Real 测速", page: "node-speed" },
    { label: "切换最快节点" },
    { sep: true },
    { label: "节点维护…", page: "node-maintain" },
    { label: "删除重复节点", page: "node-maintain" },
    { label: "清理不可用节点", page: "node-maintain" }
  ]
};

function hideCtxMenu() {
  ctxMenuEl.classList.add("hidden");
  ctxMenuEl.innerHTML = "";
  ctxTargetRow = null;
}

function openModal(pageKey) {
  const p = pages[pageKey];
  if (!p) return;
  const render = layoutRenderers[p.layout];
  modalTitleEl.textContent = p.title;
  modalBodyEl.innerHTML = render ? render(p) : `<div class="empty-note">页面布局预览待补充：${p.title}</div>`;
  modalEl.classList.remove("hidden");
  hideCtxMenu();
}

function closeModal() {
  modalEl.classList.add("hidden");
  modalBodyEl.innerHTML = "";
}

function showCtxMenu(e, type) {
  e.preventDefault();
  hideCtxMenu();
  if (type === "node") ctxTargetRow = e.target.closest("tbody tr");
  const items = ctxMenus[type] || [];
  items.forEach(item => {
    if (item.sep) {
      ctxMenuEl.appendChild(el("div", "ctx-sep"));
      return;
    }
    const btn = el("button", "ctx-item" + (item.danger ? " danger" : ""), item.label);
    if (item.page) {
      btn.onclick = () => openModal(item.page);
    } else {
      btn.classList.add("disabled");
    }
    ctxMenuEl.appendChild(btn);
  });
  ctxMenuEl.classList.remove("hidden");
  const pad = 8;
  const rect = ctxMenuEl.getBoundingClientRect();
  let x = e.clientX;
  let y = e.clientY;
  if (x + rect.width > window.innerWidth - pad) x = window.innerWidth - rect.width - pad;
  if (y + rect.height > window.innerHeight - pad) y = window.innerHeight - rect.height - pad;
  ctxMenuEl.style.left = x + "px";
  ctxMenuEl.style.top = y + "px";
}

function setProxyEnabled(on) {
  document.querySelectorAll(".proxy-switch").forEach(field => {
    const sw = field.querySelector(".switch");
    const state = field.querySelector(".state");
    if (sw) sw.classList.toggle("on", on);
    field.classList.toggle("off", !on);
    if (state) state.textContent = on ? "运行中" : "已停止";
  });
}

function handleSwitchClick(e) {
  const field = e.target.closest("[data-switch]");
  if (!field || e.target.closest("select")) return;
  const sw = field.querySelector(".switch");
  const state = field.querySelector(".state");
  if (!sw) return;
  sw.classList.toggle("on");
  const on = sw.classList.contains("on");
  field.classList.toggle("off", !on);
  const label = field.querySelector("label")?.textContent || "";
  if (label.includes("代理") && !label.includes("系统")) {
    setProxyEnabled(on);
    return;
  }
  if (!state) return;
  if (label.includes("Tun")) {
    state.textContent = on ? "已启用" : "已关闭";
  }
}

function show(key) {
  current = key;
  const p = pages[key];
  document.getElementById("title").textContent = p.title;
  const proxyOn = document.querySelector("#topTools .proxy-switch .switch")?.classList.contains("on") ?? true;
  const render = layoutRenderers[p.layout];
  document.getElementById("content").innerHTML = render ? render(p) : `<div class="empty-note">页面布局预览待补充：${p.title}</div>`;
  setProxyEnabled(proxyOn);
  const group = findGroupByPageKey(key);
  if (group) expandedGroups.add(group.title);
  buildNav(document.getElementById("navFilter").value);
  hideCtxMenu();
}

document.getElementById("navFilter").addEventListener("input", e => buildNav(e.target.value));
document.getElementById("content").addEventListener("contextmenu", e => {
  if (current !== "node-list") return;
  if (e.target.closest("tbody tr")) {
    showCtxMenu(e, "node");
    return;
  }
  if (e.target.closest(".node-table-area")) showCtxMenu(e, "list");
});
document.addEventListener("click", hideCtxMenu);
document.addEventListener("scroll", hideCtxMenu, true);
document.getElementById("modalClose").addEventListener("click", closeModal);
modalEl.addEventListener("click", e => {
  if (e.target === modalEl) closeModal();
});
document.getElementById("topTools").addEventListener("click", handleSwitchClick);
document.getElementById("content").addEventListener("click", handleSwitchClick);
buildNav();
show("node-list");
</script>
